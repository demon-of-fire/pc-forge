name: Daily Hardware Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Specific category to update (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - cpus
          - gpus
          - motherboards
          - ram
          - storage
          - psus
          - cases
          - coolers
      dry_run:
        description: 'Preview changes without saving'
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          playwright install chromium --with-deps

      - name: Run daily update
        run: |
          ARGS=""
          if [ "${{ inputs.category }}" != "" ]; then
            ARGS="$ARGS --category ${{ inputs.category }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/daily_update.py $ARGS --verbose

      - name: Commit and push changes
        if: inputs.dry_run != true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json scripts/state/progress.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            CATEGORY="${{ inputs.category }}"
            if [ -z "$CATEGORY" ]; then
              CATEGORY="all categories"
            fi
            git commit -m "chore: daily hardware data update — ${CATEGORY} — $(date -u +%Y-%m-%d)"
            git push
          fi
